<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" fill="none">
  <!-- Shopping bags icon - left side -->
  <g transform="translate(10, 5)">
    <!-- Back bag -->
    <rect x="20" y="12" width="28" height="32" rx="2" stroke="#9D174D" stroke-width="1.2" fill="none"/>
    <path d="M26 12 V8 C26 4 29 1 34 1 C39 1 42 4 42 8 V12" stroke="#9D174D" stroke-width="1.2" fill="none"/>
    <!-- Front bag -->
    <rect x="6" y="20" width="28" height="32" rx="2" stroke="#9D174D" stroke-width="1.2" fill="none"/>
    <path d="M12 20 V16 C12 12 15 9 20 9 C25 9 28 12 28 16 V20" stroke="#9D174D" stroke-width="1.2" fill="none"/>
    <!-- Smiley on front bag -->
    <circle cx="14" cy="34" r="1.5" fill="#9D174D"/>
    <circle cx="24" cy="34" r="1.5" fill="#9D174D"/>
    <path d="M13 39 C13 42 25 42 25 39" stroke="#9D174D" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Brand name - right side -->
  <text x="70" y="38" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#111827">Jack of all Trades</text>
  <!-- Tagline -->
  <text x="70" y="56" font-family="Arial, sans-serif" font-size="9" letter-spacing="3" fill="#6B7280">DREAM IT, OWN IT.</text>
</svg>
