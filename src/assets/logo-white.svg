<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Shopping bags icon -->
  <g transform="translate(60, 10)">
    <!-- Back bag -->
    <rect x="20" y="20" width="35" height="40" rx="2" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
    <path d="M28 20 V14 C28 8 32 4 37.5 4 C43 4 47 8 47 14 V20" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
    <!-- Front bag -->
    <rect x="5" y="30" width="35" height="40" rx="2" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
    <path d="M13 30 V24 C13 18 17 14 22.5 14 C28 14 32 18 32 24 V30" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
    <!-- Smiley on front bag -->
    <circle cx="15" cy="48" r="2" fill="#F9A8D4"/>
    <circle cx="28" cy="48" r="2" fill="#F9A8D4"/>
    <path d="M14 55 C14 59 30 59 30 55" stroke="#F9A8D4" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Brand name -->
  <text x="100" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">Jack of all Trades</text>
  <!-- Tagline -->
  <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" letter-spacing="3" fill="#D1D5DB">DREAM IT, OWN IT.</text>
</svg>
