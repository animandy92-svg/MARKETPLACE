<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>signin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
      font-size: 1.6rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #555;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #4f46e5;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: #4f46e5;
      text-decoration: none;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #4338ca;
    }

    .divider {
      text-align: center;
      margin: 1.2rem 0;
      color: #aaa;
      font-size: 0.85rem;
    }

    .signup-link {
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    .signup-link a {
      color: #4f46e5;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: background 0.2s;
    }

    .google-btn:hover { background: #f5f5f5; }

    .google-btn img { width: 20px; height: 20px; }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      color: #888;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #333;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Sign In</h2>
    <form action="#" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle class="eye-open" cx="12" cy="12" r="3"/>
              <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
            </svg>
          </button>
        </div>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <button type="submit">Sign In</button>
    </form>
    <div class="divider">or</div>

    <a href="#" class="google-btn">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
      Continue with Google
    </a>

    <div class="signup-link">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>
  <script>
    const toggleBtn = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');
    const eyeOpen = document.querySelectorAll('.eye-open');
    const eyeClosed = document.querySelector('.eye-closed');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.forEach(el => el.style.display = isPassword ? 'none' : '');
      eyeClosed.style.display = isPassword ? '' : 'none';
    });
  </script>
</body>
</html>
