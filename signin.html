<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>signin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
      font-size: 1.6rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #555;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #4f46e5;
    }

    /* --- New Password Toggle Styles --- */
    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-container input {
      padding-right: 4rem; /* Prevents text from hiding under the button */
    }

    .toggle-password {
      position: absolute;
      right: 0.8rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
      fill: #6b7280;
      transition: fill 0.2s;
    }

    .toggle-password:hover svg {
      fill: #4f46e5;
    }
    /* ---------------------------------- */

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: #4f46e5;
      text-decoration: none;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #4338ca;
    }

    .divider {
      text-align: center;
      margin: 1.2rem 0;
      color: #aaa;
      font-size: 0.85rem;
    }

    .signup-link {
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    .signup-link a {
      color: #4f46e5;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: background 0.2s;
    }

    .google-btn:hover { background: #f5f5f5; }

    .google-btn img { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Sign In</h2>
    <form action="#" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2z"/></svg>
          </button>
        </div>
      </div>
      
      <a href="#" class="forgot">Forgot password?</a>
      <button type="submit">Sign In</button>
    </form>
    <div class="divider">or</div>

    <a href="#" class="google-btn">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
      Continue with Google
    </a>

    <div class="signup-link">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      const eyeOpen = this.querySelector('.eye-open');
      const eyeClosed = this.querySelector('.eye-closed');
      if (type === 'password') {
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
      } else {
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
      }
    });
  </script>
</body>
</html>
