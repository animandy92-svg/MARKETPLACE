<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - TechMarket</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .signin-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .signin-body {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    .signin-card {
      background: var(--card);
      padding: 2.5rem 2rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    .signin-card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .signin-card .form-group {
      margin-bottom: 1.2rem;
    }
    .signin-card .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--muted-foreground);
      font-size: 0.9rem;
    }
    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-container .input {
      padding-right: 4rem;
    }
    .toggle-password {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-foreground);
      transition: color 0.2s;
    }
    .toggle-password:hover {
      color: var(--primary);
    }
    .toggle-password svg {
      width: 20px;
      height: 20px;
    }
    .forgot {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: var(--primary);
      text-decoration: none;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
    }
    .forgot:hover {
      text-decoration: underline;
    }
    .signin-card .btn-primary {
      width: 100%;
      height: 44px;
    }
    .divider {
      text-align: center;
      margin: 1.2rem 0;
      color: var(--muted-foreground);
      font-size: 0.85rem;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--background);
      color: var(--foreground);
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: background 0.2s;
      cursor: pointer;
    }
    .google-btn:hover { background: var(--accent); }
    .google-btn img { width: 20px; height: 20px; }
    .signup-link {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted-foreground);
    }
    .signup-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="signin-page">
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
          <path d="M3 6h18"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span>TechMarket</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="products.html?category=phone">Phones</a>
        <a href="products.html?category=laptop">Laptops</a>
        <a href="products.html?category=accessory">Accessories</a>
      </nav>
      <a href="cart.html" class="cart-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/>
          <circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
      </a>
    </div>
  </header>

  <div class="signin-body">
    <div class="signin-card">
      <h2>Sign In</h2>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="input" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-container">
            <input type="password" class="input" id="password" name="password" placeholder="••••••••" required>
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <a href="#" class="forgot">Forgot password?</a>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      <div class="divider">or</div>

      <a href="#" class="google-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
        Continue with Google
      </a>

      <div class="signup-link">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2026 TechMarket. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      const eyeOpen = this.querySelector('.eye-open');
      const eyeClosed = this.querySelector('.eye-closed');
      if (type === 'password') {
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
      } else {
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
      }
    });
  </script>
</body>
</html>
